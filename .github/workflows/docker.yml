name: Docker Image

on:
  pull_request:
    paths:
      - src/**
      - web/**
      - package.json
      - bun.lock
      - tsconfig.json
      - vite.config.ts
      - Dockerfile
      - .dockerignore
      - docker/**
      - scripts/**
      - README.md
      - config.example.yml
      - .github/workflows/docker.yml
  push:
    branches:
      - main
    paths:
      - src/**
      - web/**
      - package.json
      - bun.lock
      - tsconfig.json
      - vite.config.ts
      - Dockerfile
      - .dockerignore
      - docker/**
      - scripts/**
      - README.md
      - config.example.yml
      - .github/workflows/docker.yml
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Verify release pipeline inputs
        run: bun run verify:full

  image:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      KNOCK_IMAGE_TAG: knock:ci
      KNOCK_IMAGE_MAX_SIZE_MB: 450
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Build and size-check image
        run: bun run image:prepare

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_NAME: knock
      IMAGE_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/knock
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=sha-

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image for main
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Docker Hub README exists
        run: test -s docker/README.md

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_REPOSITORY }}
          short-description: Knock is a Bun + TypeScript subscription fetch and delivery daemon.
          readme-filepath: ./docker/README.md

  notify:
    if: always()
    needs:
      - verify
      - image
      - publish
    runs-on: ubuntu-latest
    steps:
      - name: Telegram Notify
        uses: proDreams/actions-telegram-notifier@main
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          status: ${{ (needs.verify.result == 'success' && needs.image.result == 'success' && (needs.publish.result == 'success' || needs.publish.result == 'skipped')) && 'success' || 'failure' }}
          notify_fields: "actor,repository,workflow,branch,commit"
