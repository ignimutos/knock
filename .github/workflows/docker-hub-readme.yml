name: Docker Hub README

on:
  push:
    branches:
      - main
    paths:
      - docker/README.md
      - .github/workflows/docker-hub-readme.yml
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Docker Hub README exists
        run: test -s docker/README.md

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/knock
          short-description: Knock is a Deno subscription fetch and delivery daemon.
          readme-filepath: ./docker/README.md
